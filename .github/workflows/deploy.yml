name: Build & Deploy to GitHub Pages

# Note: the repo's default branch is claude/nitro-game-modernized-6ttvsm
# (the repo was empty when the project started), and the github-pages
# environment only allows deployments from the default branch. Both
# branches trigger so deploys work now and keep working if the default
# branch is later switched to main.
on:
  push:
    branches: [main, claude/nitro-game-modernized-6ttvsm]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
