<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 56" width="96" height="56">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#e4eaf6"/>
      <stop offset="1" stop-color="#a8b4ca"/>
    </linearGradient>
  </defs>
  <!-- small wheels tucked under -->
  <rect x="20" y="6" width="14" height="8" rx="3" fill="#14161c"/>
  <rect x="20" y="42" width="14" height="8" rx="3" fill="#14161c"/>
  <rect x="58" y="8" width="12" height="7" rx="3" fill="#14161c"/>
  <rect x="58" y="41" width="12" height="7" rx="3" fill="#14161c"/>
  <!-- rear fins, swept back like a rocket -->
  <path d="M14 28 L2 8 L20 18 Z" fill="#3c4658"/>
  <path d="M14 28 L2 48 L20 38 Z" fill="#3c4658"/>
  <!-- engine nozzle -->
  <path d="M6 22 L14 20 L14 36 L6 34 Q3 28 6 22 Z" fill="#2a3040"/>
  <rect x="4" y="24" width="4" height="8" rx="2" fill="#1a1e28"/>
  <!-- neon rim glow -->
  <path d="M14 28 Q14 16 26 13 L58 12 Q80 15 93 26 L94 28 L93 30 Q80 41 58 44 L26 43 Q14 40 14 28 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4" stroke-linejoin="round"/>
  <!-- cylindrical rocket fuselage with pointed nose -->
  <path d="M14 28 Q14 16 26 13 L58 12 Q80 15 93 26 L94 28 L93 30 Q80 41 58 44 L26 43 Q14 40 14 28 Z"
        fill="url(#body)"/>
  <!-- panel lines -->
  <rect x="24" y="14" width="3" height="28" rx="1.5" fill="#8894aa"/>
  <rect x="52" y="13" width="3" height="30" rx="1.5" fill="#8894aa"/>
  <!-- round porthole cockpit -->
  <circle cx="42" cy="28" r="8" fill="#0c1626"/>
  <circle cx="44" cy="28" r="4.5" fill="#234064"/>
  <!-- nose tip -->
  <path d="M84 24 L94 28 L84 32 Q88 28 84 24 Z" fill="#ffffff" opacity="0.9"/>
</svg>
