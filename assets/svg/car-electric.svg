  </defs>
  <!-- covered aero wheels -->
  <rect x="16" y="5" width="15" height="7" rx="3.5" fill="#14161c"/>
  <rect x="16" y="44" width="15" height="7" rx="3.5" fill="#14161c"/>
  <rect x="62" y="6" width="14" height="7" rx="3.5" fill="#14161c"/>
