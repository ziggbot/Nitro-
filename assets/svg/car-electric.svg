      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#e8f2fa"/>
      <stop offset="1" stop-color="#aebcd0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0c1626"/>
